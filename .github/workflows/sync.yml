name: Daily Polar Sync

on:
  schedule:
    - cron: '0 2 * * *'  # Runs at 02:00 UTC every day
  workflow_dispatch:      # Allows manual trigger from the GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Polar Sync Script
        env:
          POLAR_CLIENT_ID: ${{ secrets.POLAR_CLIENT_ID }}
          POLAR_CLIENT_SECRET: ${{ secrets.POLAR_CLIENT_SECRET }}
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_USER_ID: ${{ secrets.POLAR_USER_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: python3 src/sync.py
